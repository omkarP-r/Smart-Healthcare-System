version: "3.8"

services:
    mongodb:
        image: mongo:latest
        container_name: mongodb
        networks:
            - app-network
        ports:
            - "27017:27017"
        environment:
            - MONGO_INITDB_ROOT_USERNAME=root
            - MONGO_INITDB_ROOT_PASSWORD=rootpassword
        volumes:
            - ./mongo-data:/data/db

    gateway-service:
        build:
            context: ./gateway-service
        container_name: gateway-service
        networks:
            - app-network
        ports:
            - "8080:8080" # Only gateway-service is exposed externally
        environment:
            - GATEWAY_SERVICE_PORT=8080
            - JWT_SECRET=aHR0cHM6Ly93d3cueW91YmlsdW1hbWVyaWNhLmNvbS9sb2dpbi8= # Base64-encoded secret
        restart: always

    auth-service:
        build:
            context: ./auth-service
        container_name: auth-service
        networks:
            - app-network
        depends_on:
            - mongodb
            - gateway-service
        environment:
            - MONGO_URI=mongodb://root:rootpassword@mongodb:27017/healthcare?authSource=admin
            - JWT_SECRET=aHR0cHM6Ly93d3cueW91YmlsdW1hbWVyaWNhLmNvbS9sb2dpbi8= # Base64-encoded secret
        restart: always

    doctor-service:
        build:
            context: ./doctor-service
        container_name: doctor-service
        networks:
            - app-network
        depends_on:
            - mongodb
            - gateway-service
        environment:
            - MONGO_URI=mongodb://root:rootpassword@mongodb:27017/healthcare?authSource=admin
        restart: always

    patient-service:
        build:
            context: ./patient-service
        container_name: patient-service
        networks:
            - app-network
        depends_on:
            - mongodb
            - gateway-service
        environment:
            - MONGO_URI=mongodb://root:rootpassword@mongodb:27017/healthcare?authSource=admin
        restart: always

    appointment-service:
        build:
            context: ./appointment-service
        container_name: appointment-service
        networks:
            - app-network
        depends_on:
            mongodb:
                condition: service_started
            gateway-service:
                condition: service_started
            doctor-service:
                condition: service_started
            patient-service:
                condition: service_started
            kafka:
                condition: service_healthy
        environment:
            - MONGO_URI=mongodb://root:rootpassword@mongodb:27017/healthcare?authSource=admin
            - KAFKA_BOOTSTRAP_SERVER=kafka:9092
            - KAFKA_TOPIC=appointments
        restart: always

    notification-service:
        build:
            context: ./notification-service
        container_name: notification-service
        networks:
            - app-network
        depends_on:
            mongodb:
                condition: service_started
            gateway-service:
                condition: service_started
            doctor-service:
                condition: service_started
            patient-service:
                condition: service_started
            appointment-service:
                condition: service_started
            kafka:
                condition: service_healthy
        environment:
            - KAFKA_BOOTSTRAP_SERVER=kafka:9092
            - KAFKA_GROUP_ID=appointment-notifications-group
            - KAFKA_TOPIC=appointments
            - MAIL_SERVER_HOST=smtp.gmail.com
            - MAIL_SERVER_PORT=587
            - MAIL_SERVER_USERNAME=noreplyhungrycoders@gmail.com
            - MAIL_SERVER_PASSWORD=password
        restart: always

    kafka:
        image: apache/kafka:3.9.0
        container_name: kafka
        ports:
            - "9092:9092"
        environment:
            # KRaft mode settings (no Zookeeper required)
            - KAFKA_NODE_ID=1
            - KAFKA_PROCESS_ROLES=broker,controller
            - KAFKA_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
            - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
            # Listener configuration
            - KAFKA_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
            - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
            - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
            - KAFKA_INTER_BROKER_LISTENER_NAME=PLAINTEXT
            # Cluster settings
            - CLUSTER_ID=MkU3OEVBNTcwNTJENDM2Qk
            # Topic settings
            - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
            - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
            - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1
            # Auto-create topics
            - KAFKA_AUTO_CREATE_TOPICS_ENABLE=true
        networks:
            - app-network
        healthcheck:
            test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 || exit 1"]
            interval: 10s
            timeout: 10s
            retries: 5
            start_period: 30s

    ui-service:
        build:
            context: ./ui-component # Path to your ReactJS project
        container_name: ui-service
        networks:
            - app-network
        depends_on:
            - mongodb
            - gateway-service
        ports:
            - "9090:80" # Expose the React app on port 9090
        restart: always

    admin-service:
        build:
            context: ./admin-service
        container_name: admin-service
        networks:
            - app-network
        depends_on:
            - appointment-service
            - auth-service
            - doctor-service
            - gateway-service
            - notification-service
            - patient-service
        ports:
            - "9093:8080"
        restart: always

networks:
    app-network:

volumes:
    mongo-data:
        driver: local
